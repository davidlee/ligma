      Error types MUST include: `FigmaUrlParseError`, `FigmaAuthError`, `FigmaNotFoundError`,
      `FigmaRateLimitError`, `FigmaRenderError`, `NormalizationError`. Each error
      MUST carry actionable context. Partial failures (e.g., render failure, subtree
      normalization failure) MUST preserve best-effort output with diagnostics rather
      than aborting the pipeline.'
