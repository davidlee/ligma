  PROD-001.FR-015:
    label: FR-015
    title: 'System MUST support selective expansion of child nodes when normalization
      detects ambiguity or truncation. Expansion triggers MUST be configurable with
      documented default thresholds. Triggers include: child count exceeding threshold,
      incomplete layout container children, text nodes needing deeper inspection,
      component instances needing referenced metadata, vector/icon nodes needing export
      data, image fills needing extraction, and incomplete variable binding context.
      The requirement is testable by verifying that triggers are configurable and
      that defaults are documented.'
