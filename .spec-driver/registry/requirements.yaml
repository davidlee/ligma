  SPEC-001.FR-018:
    label: FR-018
    title: '`normalize/interactions.ts` MUST extract Figma `interactions` arrays into
      `NormalizedInteraction[]`. Trigger types MUST be normalized to lowercase kebab-case.
      Action kinds for node-navigation MUST be derived from the `navigation` field,
      not the top-level action type. Direct actions (BACK, CLOSE, URL/OPEN_URL) MUST
      be mapped to their respective kinds. Unsupported action families (SET_VARIABLE,
      SET_VARIABLE_MODE, CONDITIONAL, UPDATE_MEDIA_RUNTIME) and media triggers (ON_MEDIA_HIT,
      ON_MEDIA_END) MUST normalize to `unknown` with warnings. Absent or empty interactions
      MUST normalize to `null`. *(Added by DE-008.)*'
