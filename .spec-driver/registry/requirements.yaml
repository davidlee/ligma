  PROD-001.NF-001:
    label: NF-001
    title: 'Normalized representation efficiency. The normalized schema MUST materially
      simplify the raw node surface by exposing a smaller, fixed, implementation-oriented
      top-level field set than typical raw Figma nodes. Total normalized output size,
      measured as `JSON.stringify` length without pretty-printing, MUST NOT exceed
      2.0x the corresponding raw input size on representative fixtures. Size ratio
      SHOULD be tracked across fixtures to catch regressions, but semantic clarity
      and implementation utility take precedence over raw byte reduction. *(Revised
      by RE-002: original ">50% reduction" target was empirically unreachable given
      intentional structural metadata additions.)*'
    specs:
