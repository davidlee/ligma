  PROD-001.FR-016:
    label: FR-016
    title: 'System MUST emit a `tokens-used.json` artifact containing a best-effort
      aggregation of variable and style references encountered during normalization
      of the selected node subtree. This is NOT a full file-level inventory. The artifact
      MUST include: scope metadata (fileKey, rootNodeId, `isFullInventory: false`),
      deduplicated variable references with token ID, name (nullable), collection
      ID, resolved type, and encountered-on locations, style references with type,
      ID, name, and encountered-on locations, and a count summary by category (colors,
      typography, spacing). Fields that cannot be resolved without the Variables API
      (token name, collection name, resolved values by mode) MUST accept null.'
    specs:
    - PROD-001
    primary_spec: PROD-001
    kind: functional
