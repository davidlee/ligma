  SPEC-001.FR-017:
    label: FR-017
    title: '`src/expand/` MUST evaluate configurable expansion triggers with documented
      default thresholds after initial normalization. v1 triggers: `depthTruncatedContainer`
      (container-type nodes with no children at the depth boundary, priority 1-2)
      and `geometryNeeded` (export-worthy vector/boolean-operation nodes fetched without
      geometry data, priority 3). The trigger architecture MUST be extensible to support
      future triggers. Default thresholds (maxTargets: 10, expansionDepth: 2) MUST
      be documented and overridable via configuration. The system MUST refetch specific
      child nodes via the cache-aware fetch helpers and merge expanded data into the
      raw tree (immutable path-cloning, whole-node replacement, deepest-first ordering),
      followed by full re-normalization. *(Updated by AUD-006: narrowed from 7 speculative
      trigger categories to 2 implemented triggers with extensible architecture per
      DR-006 DEC-036.)*'
