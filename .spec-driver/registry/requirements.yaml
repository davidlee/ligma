  PROD-001.FR-005:
    label: FR-005
    title: 'System MUST normalize raw Figma JSON into a compact, recursively structured,
      implementation-oriented representation. The normalized model MUST include: id,
      name, type classification, role inference, visibility, bounds, hierarchy metadata,
      layout, appearance, text, component info, variable bindings, asset info, semantic
      flags, children, and diagnostics. Opacity MUST be represented only in the appearance
      sub-object, not duplicated at the node level.'
    specs:
    - PROD-001
    primary_spec: PROD-001
    kind: functional
    category: null
