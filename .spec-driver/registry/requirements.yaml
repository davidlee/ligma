    label: FR-006
    title: 'System MUST classify Figma node types into a reduced implementation-relevant
      type set: `document`, `page`, `frame`, `group`, `component`, `instance`, `variant-set`,
      `text`, `shape`, `vector`, `image`, `line`, `boolean-operation`, `mask`, `section`,
      `unknown`.'
