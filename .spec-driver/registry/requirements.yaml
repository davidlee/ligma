  PROD-001.FR-007:
    label: FR-007
    title: "System MUST infer UI semantic roles from node properties (type, name,\
      \ text content, auto-layout config, dimensions, child structure, component metadata).\
      \ Role vocabulary: `screen`, `container`, `stack`, `grid`, `card`, `button`,\
      \ `icon-button`, `label`, `heading`, `body-text`, `input`, `image`, `icon`,\
      \ `divider`, `badge`, `avatar`, `list`, `list-item`, `modal`, `navigation`,\
      \ `unknown`. Inference MUST be conservative \u2014 prefer `unknown` over overconfident\
      \ guesses."
    specs:
