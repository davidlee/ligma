  PROD-001.FR-015:
    label: FR-015
    title: 'System MUST support selective expansion of child nodes when normalization
      detects ambiguity or truncation. Expansion triggers MUST be configurable with
      documented default thresholds. v1 triggers: depth-truncated containers (container-type
      nodes with no children at the depth boundary) and geometry-needed vectors (export-worthy
      vector/boolean-operation nodes fetched without geometry data). The trigger architecture
      MUST be extensible to support future triggers (e.g., text nodes needing deeper
      inspection, image fills needing extraction, incomplete variable binding context).
      The requirement is testable by verifying that triggers fire correctly, are configurable,
      and that defaults are documented.'
    specs:
    - PROD-001
    primary_spec: PROD-001
    kind: functional
    category: null
    status: active
