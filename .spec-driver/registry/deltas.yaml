  DE-002:
    kind: delta
    status: completed
    name: Delta - Project scaffold and Figma client
    slug: project_scaffold_and_figma_client
    updated: '2026-03-10'
    path: .spec-driver/deltas/DE-002-project_scaffold_and_figma_client/DE-002.md
    applies_to:
