[tasks.default]
description = "pre-commit check."
run = "mise check"

[tasks.check]
description = "pre-commit check."
run = "mise run typecheck && mise run test && mise run lint && echo 'OK: all checks passed.'"

[tasks.lint]
description = "lint. zero warnings."
run = "pnpm lint"

[tasks.test]
description = "test. TDD."
run = "pnpm exec vitest run"

[tasks.format]
description = "format."
run = "pnpm exec prettier . --write"

[tasks.typecheck]
description = "typecheck"
run = "tsc --noEmit"
